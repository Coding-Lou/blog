name: Hexo Build

on:
  push:
    branches:
      - main
    paths:
      - "myblog/**"
      - ".github/workflows/hexo-vercel.yml"
  pull_request:
    branches:
      - main
    paths:
      - "myblog/**"
      - ".github/workflows/hexo-vercel.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: myblog
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "myblog/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run build

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: hexo-public
          path: myblog/public
          if-no-files-found: error
